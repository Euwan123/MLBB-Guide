<div class="chapter-page">
  <div class="ch-page-header">
    <div class="ch-page-num">D4</div>
    <div class="ch-page-title"><span>Itemization</span> Quiz</div>
    <div class="ch-page-sub">Pick the best item path for the scenario. Score is based on first principles.</div>
  </div>

  <div class="content-section">
    <div class="chapter-content">
      <h3>Quiz</h3>
      <div id="iqWrap" style="max-width:860px;margin:0 auto;display:grid;gap:1rem;">
        <div id="iqCard" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,149,0,.22);border-radius:16px;padding:1.2rem;">
          <div id="iqQ" style="font-family:'Cinzel',serif;color:var(--gold);font-weight:700;letter-spacing:.06em;line-height:1.4;"></div>
          <div id="iqD" style="margin-top:.45rem;color:#b7d0ea;line-height:1.8;"></div>
          <div id="iqA" style="margin-top:1rem;display:grid;gap:.7rem;"></div>
        </div>
        <div style="display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;">
          <button class="btn-back" type="button" onclick="window.iqReset()">Reset</button>
          <button class="btn-next" type="button" onclick="window.iqNext()">Next</button>
        </div>
        <div id="iqScoreBox" style="display:none;background:rgba(255,255,255,.05);border:1px solid rgba(255,149,0,.22);border-radius:16px;padding:1.1rem;">
          <div style="font-family:'Cinzel',serif;color:var(--gold);font-weight:700;letter-spacing:.06em;">Score</div>
          <div id="iqScoreLine" style="margin-top:.4rem;color:#cfe6ff;font-size:1.05rem;line-height:1.7;"></div>
          <div id="iqTip" style="margin-top:.35rem;color:#a9c4df;line-height:1.7;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="chapter-nav">
    <button class="btn-back" type="button" onclick="NAV.goHome()">← Chapters</button>
  </div>
</div>

<script>
  (function() {
    function $(id) { return document.getElementById(id); }

    var questions = [
      {
        q: 'You are the marksman. Enemy has heavy burst + one assassin constantly diving you.',
        d: 'What is your priority item direction?',
        a: [
          { t: 'Wind of Nature / defensive timing item', ok: true, why: 'You need a timing tool to survive the dive and keep DPS uptime.' },
          { t: 'Full damage 2nd item spike', ok: false, why: 'If you die first every fight, more damage does nothing.' },
          { t: 'Early anti-heal always', ok: false, why: 'Anti-heal is good only if healing is the problem.' }
        ]
      },
      {
        q: 'Enemy has 2+ sustain heroes and teamfights are long.',
        d: 'What item theme is most important early?',
        a: [
          { t: 'Anti-heal (Sea Halberd / Necklace / Dominance)', ok: true, why: 'Cutting healing increases your effective damage for the entire fight.' },
          { t: 'Only penetration stacking', ok: false, why: 'Pen is good, but sustain will outlast your damage without anti-heal.' },
          { t: 'Greed crit scaling', ok: false, why: 'Crit scaling is slower and doesn’t solve the immediate sustain.' }
        ]
      },
      {
        q: 'Enemy front line is extremely tanky and fights are front-to-back.',
        d: 'What is the most consistent damage approach?',
        a: [
          { t: 'Sustained DPS with pen and on-hit', ok: true, why: 'You need repeatable damage that doesn’t rely on one rotation.' },
          { t: 'Pure burst items', ok: false, why: 'Burst rarely kills true tanks; sustained DPS wins long fights.' },
          { t: 'Ignore tanks and dive backline every time', ok: false, why: 'If you can’t reach backline safely, you lose the fight before that happens.' }
        ]
      }
    ];

    var idx = 0;
    var score = 0;
    var answered = false;

    function render() {
      var q = questions[idx];
      answered = false;
      var qEl = $('iqQ');
      var dEl = $('iqD');
      var aEl = $('iqA');
      if (qEl) qEl.textContent = 'Q' + (idx + 1) + ': ' + q.q;
      if (dEl) dEl.textContent = q.d;
      if (aEl) aEl.innerHTML = '';
      q.a.forEach(function(opt, i) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'nav-button';
        btn.style.width = '100%';
        btn.style.textAlign = 'left';
        btn.textContent = String.fromCharCode(65 + i) + ') ' + opt.t;
        btn.addEventListener('click', function() {
          if (answered) return;
          answered = true;
          if (opt.ok) score += 1;
          var box = $('iqScoreBox');
          var line = $('iqScoreLine');
          var tip = $('iqTip');
          if (box) box.style.display = 'block';
          if (line) line.textContent = 'Current: ' + score + '/' + questions.length;
          if (tip) tip.textContent = opt.why;
          btn.style.borderColor = opt.ok ? 'rgba(34,197,94,.45)' : 'rgba(220,38,38,.45)';
          btn.style.background = opt.ok ? 'rgba(34,197,94,.08)' : 'rgba(220,38,38,.08)';
        });
        if (aEl) aEl.appendChild(btn);
      });
    }

    window.iqNext = function() {
      if (idx < questions.length - 1) {
        idx += 1;
        render();
        return;
      }
      var box = $('iqScoreBox');
      var line = $('iqScoreLine');
      var tip = $('iqTip');
      if (box) box.style.display = 'block';
      if (line) line.textContent = 'Final: ' + score + '/' + questions.length;
      if (tip) tip.textContent = 'Good itemization is about solving the biggest problem first, then scaling damage.';
    };

    window.iqReset = function() {
      idx = 0;
      score = 0;
      var box = $('iqScoreBox');
      if (box) box.style.display = 'none';
      render();
    };

    render();
  })();
</script>
